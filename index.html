
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELF Home | Elovefi Home OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&family=Caveat:wght@400;700&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #fafafa;
          -webkit-font-smoothing: antialiased;
          font-size: 13px; 
          color: #0f172a;
          font-weight: 400;
        }
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Custom Horizontal Scrollbar for Training Matrix */
        .custom-scrollbar-h::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar-h::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        .custom-scrollbar-h::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 10px; }
        .custom-scrollbar-h::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }

        .vibrant-card {
          background: #ffffff;
          border: 1px solid #eef2f6;
          box-shadow: 0 2px 10px -2px rgba(0,0,0,0.02);
          border-radius: 0.75rem;
          transition: all 0.2s ease-out;
        }
        
        .vibrant-card:hover {
          transform: translateY(-1px);
          box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .animate-fadeIn {
          animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(5px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* 极致平滑的电影院翻页动画 */
        .animate-cinemaSmooth {
          animation: cinemaSmooth 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes cinemaSmooth {
          0% { opacity: 0; transform: scale(0.995); filter: blur(4px); }
          100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        select, input, button {
          border-radius: 0.5rem !important;
        }
        
        .font-os-header {
          letter-spacing: -0.01em;
        }

        /* The Custom Handwritten Font Stack */
        .font-handwritten {
          font-family: "PingFang ShiGuang", "Zhi Mang Xing", "Ma Shan Zheng", "Caveat", cursive;
        }

        /* Enlarge native date/time picker icons */
        input::-webkit-calendar-picker-indicator {
          width: 18px;
          height: 18px;
          cursor: pointer;
          opacity: 0.6;
          transition: opacity 0.2s;
        }
        input::-webkit-calendar-picker-indicator:hover {
          opacity: 1;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.475.0",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.48.0"
  }
}
</script>
</head>
<body class="text-slate-900">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
